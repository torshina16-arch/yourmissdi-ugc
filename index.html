<!doctype html>
<html lang="en-US">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Diana | Chicago UGC Creator</title>
<meta name="description" content="">
<meta property="og:title" content="">
<meta property="og:description" content="">
<meta property="og:image" content="">
<link id="favicon" rel="icon" href="">
<style>
:root{
  --ink:#202425;--paper:#fffdf9;--ivory:#fffaf1;--cloud:#d9e8ec;
  --rose:#e8b8c1;--butter:#fff0a8;--muted:#697477;
  --nav-bg:#fffdf9;--hero-start:#fffdf8;--hero-mid:#f6fbfa;
  --hero-end:#eef7f8;--hero-glow:#e8b8c1;--statement-overlay:#9dbec7;
  --service-card:#ffffff;--campaign-card:#fff0a8;
  --contact-bg:#202425;--contact-text:#ffffff;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:var(--paper);color:var(--ink);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;line-height:1.6}
a{color:inherit;text-decoration:none}
img,video{display:block;width:100%}
.container{width:min(1180px,calc(100% - 34px));margin:auto}
.eyebrow{display:flex;align-items:center;gap:10px;text-transform:uppercase;letter-spacing:.2em;font-size:.75rem;font-weight:800}
.eyebrow:before{content:"";width:34px;height:1px;background:currentColor;flex:none}
.nav{position:fixed;inset:0 0 auto;z-index:20;background:color-mix(in srgb,var(--nav-bg) 86%,transparent);backdrop-filter:blur(18px);border-bottom:1px solid color-mix(in srgb,var(--ink) 8%,transparent)}
.nav-inner{height:72px;display:flex;align-items:center;justify-content:space-between}
.logo{font:700 1.55rem Georgia,serif}
.menu{display:flex;gap:26px;font-size:.9rem}
.hero{min-height:100vh;display:grid;align-items:center;padding-top:72px;overflow:hidden;background:radial-gradient(circle at 12% 20%,color-mix(in srgb,var(--hero-glow) 28%,transparent),transparent 24%),linear-gradient(135deg,var(--hero-start),var(--hero-mid) 52%,var(--hero-end))}
.hero-grid,.about-grid,.contact-grid,.details-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:62px;align-items:center;padding:72px 0}
h1{font:500 clamp(4.7rem,8.2vw,8rem)/.84 Georgia,serif;letter-spacing:-.07em;margin:26px 0 22px}
.hero-copy{font-size:clamp(1.1rem,2vw,1.35rem);max-width:590px;color:color-mix(in srgb,var(--ink) 76%,white)}
.location{margin-top:22px;font-weight:750}
.buttons{display:flex;flex-wrap:wrap;gap:10px;margin-top:28px}
.pill{display:inline-flex;align-items:center;justify-content:center;padding:13px 19px;border:1px solid currentColor;border-radius:999px;font-weight:750;transition:.2s}
.pill:hover{transform:translateY(-2px)}
.pill.dark{background:var(--ink);color:#fff;border-color:var(--ink)}
.pill.light{background:transparent}
.hero-visual{position:relative}
.hero-visual:before{content:"";position:absolute;inset:9% -7% -5% 18%;background:var(--butter);border-radius:48% 48% 20% 20%;transform:rotate(2deg)}
.hero-img{position:relative;z-index:1;height:700px;object-fit:cover;border-radius:48% 48% 20% 20%;box-shadow:0 35px 90px color-mix(in srgb,var(--ink) 16%,transparent)}
.float-card{position:absolute;z-index:3;background:var(--paper);padding:15px 18px;border-radius:18px;box-shadow:0 15px 40px color-mix(in srgb,var(--ink) 14%,transparent);font-size:.86rem;font-weight:800}
.float-card.top{left:-20px;top:80px}
.float-card.bottom{right:-10px;bottom:35px}
.section{padding:112px 0}
.about{background:var(--ivory)}
.about-grid{grid-template-columns:.9fr 1.1fr}
.about-image-wrap{position:relative}
.about-img{height:690px;object-fit:cover;border-radius:26px}
.about-badge{position:absolute;right:-18px;bottom:0;background:var(--rose);padding:14px 20px;border-radius:18px;font-weight:800}
.title{font:500 clamp(2.8rem,5.2vw,5.4rem)/.96 Georgia,serif;letter-spacing:-.05em;margin:0 0 20px}
.intro,.portfolio-head p,.card p,.step p,.details-grid>div>p{color:var(--muted)}
.values{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:24px;margin-top:38px}
.value{border-top:1px solid color-mix(in srgb,var(--ink) 14%,transparent);padding-top:18px}
.value h3,.value p{margin-top:0}
.statement{padding:92px 0;background-size:cover;background-position:center;text-align:center}
.statement p{font:clamp(2.2rem,4.4vw,4.6rem)/1.04 Georgia,serif;max-width:930px;margin:auto}
.portfolio-head{display:flex;justify-content:space-between;align-items:end;gap:40px;margin-bottom:42px}
.portfolio-head p{max-width:460px}
.reel-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:20px}
.reel{position:relative;overflow:hidden;border-radius:28px;aspect-ratio:9/16;background:#ddd;box-shadow:0 18px 50px color-mix(in srgb,var(--ink) 11%,transparent)}
.reel img,.reel video{height:100%;object-fit:cover}
.reel:after{content:"";position:absolute;inset:0;background:linear-gradient(transparent 54%,rgba(0,0,0,.72));pointer-events:none}
.reel-copy{position:absolute;z-index:2;left:20px;right:20px;bottom:20px;color:#fff;pointer-events:none}
.reel-copy small{display:block;opacity:.8}
.photo-grid{display:grid;grid-template-columns:1.15fr .85fr .85fr;grid-auto-rows:340px;gap:16px;margin-top:86px}
.photo-grid figure{margin:0;border-radius:24px;overflow:hidden}
.photo-grid figure:first-child{grid-row:span 2}
.photo-grid figure:nth-child(4){grid-column:span 2}
.photo-grid img{height:100%;object-fit:cover}
.services{background:var(--cloud)}
.cards{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:18px;margin-top:46px}
.card{background:color-mix(in srgb,var(--service-card) 82%,transparent);padding:30px;border-radius:24px;min-height:220px}
.num{font:2.1rem Georgia,serif;color:color-mix(in srgb,var(--ink) 65%,var(--rose))}
.process{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:18px;margin-top:44px}
.step{border-top:1px solid var(--ink);padding-top:24px}
.step small{font-weight:800;letter-spacing:.12em}
.step h3{font:1.7rem Georgia,serif;margin-bottom:10px}
.details-grid{grid-template-columns:1fr 1fr;align-items:start}
.details-box{background:var(--campaign-card);padding:32px;border-radius:24px}
.details-box ul{padding-left:22px}
.contact{background:var(--contact-bg);color:var(--contact-text)}
.contact h2{font:clamp(3.6rem,6vw,6.8rem)/.9 Georgia,serif;letter-spacing:-.055em}
.contact .pill.dark{background:var(--contact-text);color:var(--contact-bg);border-color:var(--contact-text)}
.contact .pill.light{color:var(--contact-text)}
.contact-img{height:620px;object-fit:cover;border-radius:28px}
footer{background:var(--contact-bg);color:color-mix(in srgb,var(--contact-text) 66%,transparent);padding:24px 0;border-top:1px solid color-mix(in srgb,var(--contact-text) 10%,transparent)}
.footer{display:flex;justify-content:space-between;gap:20px}
.loading{min-height:100vh;display:grid;place-items:center}
@media(max-width:850px){
  .menu{display:none}
  .hero-grid,.about-grid,.contact-grid,.details-grid{grid-template-columns:1fr}
  .values,.cards{grid-template-columns:1fr 1fr}
  .reel-grid{grid-template-columns:1fr 1fr}
  .process{grid-template-columns:1fr 1fr}
  .photo-grid{grid-template-columns:1fr 1fr;grid-auto-rows:330px}
  .photo-grid figure:first-child{grid-row:auto}
  .photo-grid figure:nth-child(4){grid-column:span 2}
}
@media(max-width:560px){
  .section{padding:78px 0}
  h1{font-size:4.3rem}
  .hero-img{height:520px}
  .values,.cards,.reel-grid,.process{grid-template-columns:1fr}
  .photo-grid{grid-template-columns:1fr;grid-auto-rows:330px}
  .photo-grid figure:nth-child(4){grid-column:auto}
  .about-img,.contact-img{height:520px}
  .portfolio-head{display:block}
  .footer{display:block}
  .float-card.top{left:8px;top:20px}
  .float-card.bottom{right:8px;bottom:20px}
}
</style>
</head>
<body>
<div id="app" class="loading">Loading portfolio…</div>
<script>
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));
const targetAttr=b=>b?.newTab?' target="_blank" rel="noopener noreferrer"':'';
const btnClass=b=>b?.style==='dark'?'pill dark':'pill light';
const renderButtons=items=>(items||[]).map(b=>`<a class="${btnClass(b)}" href="${esc(b.url)}"${targetAttr(b)}>${esc(b.label)}</a>`).join('');
const setVar=(name,value)=>value&&document.documentElement.style.setProperty(name,value);

fetch('/content/site.json?'+Date.now()).then(r=>{
  if(!r.ok) throw new Error('Content could not be loaded');
  return r.json();
}).then(d=>{
  document.title=d.seo?.title||d.hero?.title||d.brand?.name||'Portfolio';
  document.querySelector('meta[name="description"]').content=d.seo?.description||'';
  document.querySelector('meta[property="og:title"]').content=d.seo?.title||'';
  document.querySelector('meta[property="og:description"]').content=d.seo?.description||'';
  document.querySelector('meta[property="og:image"]').content=d.seo?.shareImage||'';
  if(d.seo?.favicon) document.getElementById('favicon').href=d.seo.favicon;

  const t=d.theme||{};
  setVar('--ink',t.ink);setVar('--paper',t.paper);setVar('--ivory',t.ivory);
  setVar('--cloud',t.cloud);setVar('--rose',t.rose);setVar('--butter',t.butter);
  setVar('--muted',t.muted);setVar('--nav-bg',t.navBackground);
  setVar('--hero-start',t.heroBackgroundStart);setVar('--hero-mid',t.heroBackgroundMiddle);
  setVar('--hero-end',t.heroBackgroundEnd);setVar('--hero-glow',t.heroGlow);
  setVar('--statement-overlay',t.statementOverlay);setVar('--service-card',t.serviceCardBackground);
  setVar('--campaign-card',t.campaignCardBackground);setVar('--contact-bg',t.contactBackground);
  setVar('--contact-text',t.contactText);

  const nav=(d.navigation||[]).map(n=>`<a href="${esc(n.target)}">${esc(n.label)}</a>`).join('');
  const values=(d.about?.values||[]).map(v=>`<div class="value"><h3>${esc(v.title)}</h3><p>${esc(v.text)}</p></div>`).join('');
  const videos=(d.videoSection?.videos||[]).map(v=>`<article class="reel">${v.video?`<video src="${esc(v.video)}" poster="${esc(v.cover)}" controls playsinline preload="metadata"></video>`:`<img src="${esc(v.cover)}" alt="${esc(v.coverAlt||v.title)}">`}<div class="reel-copy"><small>${esc(v.category)}</small><strong>${esc(v.title)}</strong></div></article>`).join('');
  const photos=(d.photoSection?.photos||[]).map(p=>`<figure><img src="${esc(p.image)}" alt="${esc(p.alt)}"></figure>`).join('');
  const services=(d.servicesSection?.services||[]).map(s=>`<div class="card"><div class="num">${esc(s.number)}</div><h3>${esc(s.title)}</h3><p>${esc(s.text)}</p></div>`).join('');
  const steps=(d.processSection?.steps||[]).map(s=>`<div class="step"><small>${esc(s.number)}</small><h3>${esc(s.title)}</h3><p>${esc(s.text)}</p></div>`).join('');
  const options=(d.campaignSection?.options||[]).map(o=>`<li>${esc(o.text)}</li>`).join('');

  const app=document.getElementById('app');
  app.className='';
  app.innerHTML=`
  <nav class="nav"><div class="container nav-inner"><a class="logo" href="#top">${esc(d.brand?.logoText||d.brand?.name)}</a><div class="menu">${nav}</div></div></nav>
  <main id="top">
    <section class="hero">
      <div class="container hero-grid">
        <div>
          <div class="eyebrow">${esc(d.hero?.topLabel)}</div>
          <h1>${esc(d.hero?.title)}</h1>
          <p class="hero-copy">${esc(d.hero?.description)}</p>
          <div class="location">${esc(d.hero?.location)}</div>
          <div class="buttons">${renderButtons(d.hero?.primaryButtons)}</div>
          <div class="buttons">${renderButtons(d.hero?.socialButtons)}</div>
        </div>
        <div class="hero-visual">
          <img class="hero-img" src="${esc(d.hero?.image)}" alt="${esc(d.hero?.imageAlt)}">
          ${d.hero?.topBadge?`<div class="float-card top">${esc(d.hero.topBadge)}</div>`:''}
          ${d.hero?.bottomBadge?`<div class="float-card bottom">${esc(d.hero.bottomBadge)}</div>`:''}
        </div>
      </div>
    </section>

    <section class="section about" id="about">
      <div class="container about-grid">
        <div class="about-image-wrap">
          <img class="about-img" src="${esc(d.about?.image)}" alt="${esc(d.about?.imageAlt)}">
          ${d.about?.imageBadge?`<div class="about-badge">${esc(d.about.imageBadge)}</div>`:''}
        </div>
        <div>
          <div class="eyebrow">${esc(d.about?.sectionLabel)}</div>
          <h2 class="title">${esc(d.about?.title)}</h2>
          <p class="intro">${esc(d.about?.text)}</p>
          <div class="values">${values}</div>
        </div>
      </div>
    </section>

    <section class="statement" style="background-image:linear-gradient(color-mix(in srgb,var(--statement-overlay) 16%,transparent),color-mix(in srgb,var(--statement-overlay) 16%,transparent)),url('${esc(d.statement?.backgroundImage)}')">
      <div class="container"><p>${esc(d.statement?.text)}</p></div>
    </section>

    <section class="section" id="portfolio">
      <div class="container">
        <div class="portfolio-head">
          <div><div class="eyebrow">${esc(d.videoSection?.sectionLabel)}</div><h2 class="title">${esc(d.videoSection?.title)}</h2></div>
          <p>${esc(d.videoSection?.description)}</p>
        </div>
        <div class="reel-grid">${videos}</div>

        <div class="portfolio-head" style="margin-top:100px">
          <div><div class="eyebrow">${esc(d.photoSection?.sectionLabel)}</div><h2 class="title">${esc(d.photoSection?.title)}</h2></div>
          <p>${esc(d.photoSection?.description)}</p>
        </div>
        <div class="photo-grid">${photos}</div>
      </div>
    </section>

    <section class="section services" id="services">
      <div class="container">
        <div class="eyebrow">${esc(d.servicesSection?.sectionLabel)}</div>
        <h2 class="title">${esc(d.servicesSection?.title)}</h2>
        <div class="cards">${services}</div>
      </div>
    </section>

    <section class="section" id="process">
      <div class="container">
        <div class="eyebrow">${esc(d.processSection?.sectionLabel)}</div>
        <h2 class="title">${esc(d.processSection?.title)}</h2>
        <div class="process">${steps}</div>
      </div>
    </section>

    <section class="section">
      <div class="container details-grid">
        <div>
          <div class="eyebrow">${esc(d.campaignSection?.sectionLabel)}</div>
          <h2 class="title">${esc(d.campaignSection?.title)}</h2>
          <p>${esc(d.campaignSection?.description)}</p>
        </div>
        <div class="details-box">
          <strong>${esc(d.campaignSection?.cardTitle)}</strong>
          <ul>${options}</ul>
          <p><strong>${esc(d.campaignSection?.rateLead)}</strong> ${esc(d.campaignSection?.rateText)}</p>
        </div>
      </div>
    </section>

    <section class="section contact" id="contact">
      <div class="container contact-grid">
        <div>
          <div class="eyebrow">${esc(d.contactSection?.sectionLabel)}</div>
          <h2>${esc(d.contactSection?.title)}</h2>
          <p>${esc(d.contactSection?.description)}</p>
          <div class="buttons">${renderButtons(d.contactSection?.buttons)}</div>
        </div>
        <img class="contact-img" src="${esc(d.contactSection?.image)}" alt="${esc(d.contactSection?.imageAlt)}">
      </div>
    </section>
  </main>
  <footer><div class="container footer"><span>${esc(d.footer?.leftText)}</span><span>${esc(d.footer?.rightText)}</span></div></footer>`;
}).catch(err=>{
  document.getElementById('app').innerHTML='<p>Content could not be loaded.</p>';
  console.error(err);
});
</script>
</body>
</html>
