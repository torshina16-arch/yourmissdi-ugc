<!doctype html><html lang="en-US"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Diana | Chicago UGC Creator</title><style>
:root{--ink:#202425;--ivory:#fffaf1;--paper:#fffdf9;--cloud:#d9e8ec;--rose:#e8b8c1;--butter:#fff0a8;--muted:#697477}
*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:var(--paper);color:var(--ink);font-family:Inter,system-ui,sans-serif;line-height:1.6}a{color:inherit;text-decoration:none}img,video{display:block;width:100%}.container{width:min(1180px,calc(100% - 34px));margin:auto}.eyebrow{display:flex;align-items:center;gap:10px;text-transform:uppercase;letter-spacing:.2em;font-size:.75rem;font-weight:800}.eyebrow:before{content:"";width:34px;height:1px;background:currentColor}.nav{position:fixed;inset:0 0 auto;z-index:20;background:#fffdf9d9;backdrop-filter:blur(18px);border-bottom:1px solid #20242514}.nav-inner{height:72px;display:flex;align-items:center;justify-content:space-between}.logo{font:700 1.55rem Georgia,serif}.menu{display:flex;gap:26px;font-size:.9rem}.hero{min-height:100vh;display:grid;align-items:center;padding-top:72px;overflow:hidden;background:radial-gradient(circle at 12% 20%,#e8b8c140,transparent 24%),linear-gradient(135deg,#fffdf8,#f6fbfa 52%,#eef7f8)}.hero-grid,.about-grid,.contact-grid,.details-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:62px;align-items:center;padding:72px 0}h1{font:500 clamp(4.7rem,8.2vw,8rem)/.84 Georgia,serif;letter-spacing:-.07em;margin:26px 0 22px}.hero-copy{font-size:clamp(1.1rem,2vw,1.35rem);max-width:590px;color:#4f5a5d}.location{margin-top:22px;font-weight:750}.buttons{display:flex;flex-wrap:wrap;gap:10px;margin-top:28px}.pill{padding:13px 19px;border:1px solid var(--ink);border-radius:999px;font-weight:750}.pill.dark{background:var(--ink);color:#fff}.hero-visual{position:relative}.hero-visual:before{content:"";position:absolute;inset:9% -7% -5% 18%;background:var(--butter);border-radius:48% 48% 20% 20%;transform:rotate(2deg)}.hero-img{position:relative;z-index:1;height:700px;object-fit:cover;border-radius:48% 48% 20% 20%;box-shadow:0 35px 90px #20242529}.section{padding:112px 0}.about{background:var(--ivory)}.about-grid{grid-template-columns:.9fr 1.1fr}.about-img{height:690px;object-fit:cover;border-radius:26px}.title{font:500 clamp(2.8rem,5.2vw,5.4rem)/.96 Georgia,serif;letter-spacing:-.05em;margin:0 0 20px}.intro,.portfolio-head p,.card p{color:var(--muted)}.values{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:38px}.value{border-top:1px solid #20242524;padding-top:18px}.statement{padding:92px 0;background-size:cover;background-position:center;text-align:center}.statement p{font:clamp(2.2rem,4.4vw,4.6rem)/1.04 Georgia,serif;max-width:930px;margin:auto}.portfolio-head{display:flex;justify-content:space-between;align-items:end;gap:40px;margin-bottom:42px}.reel-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}.reel{position:relative;overflow:hidden;border-radius:28px;aspect-ratio:9/16;background:#ddd;box-shadow:0 18px 50px #2024251c}.reel img,.reel video{height:100%;object-fit:cover}.reel:after{content:"";position:absolute;inset:0;background:linear-gradient(transparent 54%,#000b);pointer-events:none}.reel-copy{position:absolute;z-index:2;left:20px;right:20px;bottom:20px;color:#fff}.reel-copy small{display:block;opacity:.8}.photo-grid{display:grid;grid-template-columns:1.15fr .85fr .85fr;grid-template-rows:340px 340px;gap:16px;margin-top:86px}.photo-grid figure{margin:0;border-radius:24px;overflow:hidden}.photo-grid figure:first-child{grid-row:1/3}.photo-grid figure:nth-child(4){grid-column:2/4}.photo-grid img{height:100%;object-fit:cover}.services{background:var(--cloud)}.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:46px}.card{background:#ffffffbd;padding:30px;border-radius:24px;min-height:220px}.num{font:2.1rem Georgia,serif}.process{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-top:44px}.step{border-top:1px solid;padding-top:24px}.details-grid{grid-template-columns:1fr 1fr}.details-box{background:var(--butter);padding:32px;border-radius:24px}.contact{background:var(--ink);color:#fff}.contact h2{font:clamp(3.6rem,6vw,6.8rem)/.9 Georgia,serif;letter-spacing:-.055em}.contact-img{height:620px;object-fit:cover;border-radius:28px}footer{background:var(--ink);color:#ffffffaa;padding:24px 0;border-top:1px solid #ffffff1a}.footer{display:flex;justify-content:space-between}.loading{min-height:100vh;display:grid;place-items:center}
@media(max-width:850px){.menu{display:none}.hero-grid,.about-grid,.contact-grid,.details-grid{grid-template-columns:1fr}.values,.cards{grid-template-columns:1fr 1fr}.reel-grid{grid-template-columns:1fr 1fr}.process{grid-template-columns:1fr 1fr}.photo-grid{grid-template-columns:1fr 1fr;grid-template-rows:330px 330px}.photo-grid figure:first-child{grid-row:auto}.photo-grid figure:nth-child(4){grid-column:1/3}}
@media(max-width:560px){.section{padding:78px 0}h1{font-size:4.3rem}.hero-img{height:520px}.values,.cards,.reel-grid,.process{grid-template-columns:1fr}.photo-grid{grid-template-columns:1fr;grid-template-rows:repeat(4,330px)}.photo-grid figure:nth-child(4){grid-column:auto}.about-img,.contact-img{height:520px}.portfolio-head{display:block}.footer{display:block}}
</style></head><body><div id="app" class="loading">Loading portfolio…</div><script>
const e=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));
fetch('/content/site.json?'+Date.now()).then(r=>r.json()).then(d=>{
const vids=d.videos.map(v=>`<article class="reel">${v.video?`<video src="${e(v.video)}" poster="${e(v.cover)}" controls playsinline preload="metadata"></video>`:`<img src="${e(v.cover)}" alt="${e(v.title)}">`}<div class="reel-copy"><small>${e(v.category)}</small><strong>${e(v.title)}</strong></div></article>`).join('');
const photos=d.photos.map(p=>`<figure><img src="${e(p.image)}" alt="${e(p.alt)}"></figure>`).join('');
const services=d.services.map(s=>`<div class="card"><div class="num">${e(s.number)}</div><h3>${e(s.title)}</h3><p>${e(s.text)}</p></div>`).join('');
document.title=`${d.siteTitle} | Chicago UGC Creator`;app.className='';app.innerHTML=`
<nav class="nav"><div class="container nav-inner"><a class="logo" href="#top">${e(d.siteTitle).toUpperCase()}</a><div class="menu"><a href="#about">About</a><a href="#portfolio">Portfolio</a><a href="#services">Services</a><a href="#process">Process</a><a href="#contact">Contact</a></div></div></nav>
<main id="top"><section class="hero"><div class="container hero-grid"><div><div class="eyebrow">${e(d.eyebrow)}</div><h1>${e(d.siteTitle)}</h1><p class="hero-copy">${e(d.heroText)}</p><div class="location">${e(d.location)}</div><div class="buttons"><a class="pill dark" href="#portfolio">View my work</a><a class="pill" href="mailto:${e(d.email)}">Work with me</a></div><div class="buttons"><a class="pill" href="${e(d.instagram)}">Instagram</a><a class="pill" href="${e(d.youtube)}">YouTube</a><a class="pill" href="${e(d.telegram)}">Telegram</a></div></div><div class="hero-visual"><img class="hero-img" src="${e(d.heroImage)}"></div></div></section>
<section class="section about" id="about"><div class="container about-grid"><img class="about-img" src="${e(d.aboutImage)}"><div><div class="eyebrow">Why work with me</div><h2 class="title">${e(d.aboutTitle)}</h2><p class="intro">${e(d.aboutText)}</p><div class="values"><div class="value"><h3>Authentic delivery</h3><p>Natural storytelling instead of overly scripted advertising.</p></div><div class="value"><h3>Detail-oriented</h3><p>Thoughtful lighting, framing, hooks, pacing, and product presentation.</p></div><div class="value"><h3>Bilingual creator</h3><p>Content available in English or Russian.</p></div><div class="value"><h3>Reliable process</h3><p>Clear communication and on-time delivery.</p></div></div></div></div></section>
<section class="statement" style="background-image:linear-gradient(#9dbec729,#9dbec729),url('${e(d.cloudImage)}')"><div class="container"><p>${e(d.statement)}</p></div></section>
<section class="section" id="portfolio"><div class="container"><div class="portfolio-head"><div><div class="eyebrow">Selected work</div><h2 class="title">UGC video</h2></div><p>Short-form concepts for Reels, TikTok, organic social, and paid campaigns.</p></div><div class="reel-grid">${vids}</div><div class="portfolio-head" style="margin-top:100px"><div><div class="eyebrow">Visual storytelling</div><h2 class="title">UGC photography</h2></div><p>Lifestyle imagery for social media, websites, email campaigns, and product pages.</p></div><div class="photo-grid">${photos}</div></div></section>
<section class="section services" id="services"><div class="container"><div class="eyebrow">Services</div><h2 class="title">Ways we can create together.</h2><div class="cards">${services}</div></div></section>
<section class="section" id="process"><div class="container"><div class="eyebrow">The process</div><h2 class="title">Simple, clear, and collaborative.</h2><div class="process"><div class="step"><small>STEP 01</small><h3>Brief</h3><p>You share the product, goals, and timeline.</p></div><div class="step"><small>STEP 02</small><h3>Concept</h3><p>We confirm creative direction, scope, and rate.</p></div><div class="step"><small>STEP 03</small><h3>Create</h3><p>I film and edit the approved content.</p></div><div class="step"><small>STEP 04</small><h3>Deliver</h3><p>You receive polished final files.</p></div></div></div></section>
<section class="section"><div class="container details-grid"><div><div class="eyebrow">Collaboration details</div><h2 class="title">Built around your campaign.</h2></div><div class="details-box"><strong>Available collaboration options</strong><ul><li>One-time UGC projects</li><li>Monthly content packages</li><li>Organic social content</li><li>Paid ad creatives</li><li>Raw footage and extra hooks</li></ul><p><strong>Rates available upon request.</strong></p></div></div></section>
<section class="section contact" id="contact"><div class="container contact-grid"><div><div class="eyebrow">Let's work together</div><h2>Let’s create something people actually want to watch.</h2><p>Based in Chicago, IL · Available worldwide.</p><div class="buttons"><a class="pill" href="mailto:${e(d.email)}">Email me</a><a class="pill" href="${e(d.instagram)}">Instagram</a><a class="pill" href="${e(d.youtube)}">YouTube</a></div></div><img class="contact-img" src="${e(d.contactImage)}"></div></section></main><footer><div class="container footer"><span>© 2026 ${e(d.siteTitle)} — UGC Creator</span><span>${e(d.email)}</span></div></footer>`}).catch(()=>app.innerHTML='<p>Content could not be loaded.</p>');
</script></body></html>
